duration_ms: 12000

buffers {
    size_kb: 65536
    fill_policy: RING_BUFFER
}

data_sources {
    config {
        name: "linux.ftrace"
        target_buffer: 0
        ftrace_config {
            ftrace_events: "sched_switch"
            ftrace_events: "sched_waking"
            ftrace_events: "sched_wakeup_new"
            ftrace_events: "sched_migrate_task"
            ftrace_events: "sched_process_exec"
            ftrace_events: "sched_process_exit"
            ftrace_events: "sched_process_fork"
            ftrace_events: "sched_process_free"
            ftrace_events: "sched_process_hang"
            ftrace_events: "sched_process_wait"

            symbolize_ksyms: true
            enable_function_graph: true
            function_filters: "dl_task_timer"
            function_filters: "update_curr_dl_se"
            function_filters: "start_dl_timer"
            function_filters: "dl_server_start"
            function_filters: "dl_server_update"
            function_filters: "dl_server_stop"
            function_filters: "enqueue_dl_entity"
            function_filters: "__dequeue_dl_entity"
            function_filters: "replenish_dl_entity"
            function_filters: "pick_task_dl"

            function_filters: "rt_server_pick"
            function_filters: "group_pull_rt_task"
            function_filters: "group_push_rt_task.constprop.0"
            function_filters: "pick_next_rt_entity"
            function_filters: "rt_queue_push_from_group"
            function_filters: "rt_queue_pull_to_group"
            function_filters: "*_rt"

            function_filters: "resched_curr"
            function_filters: "pick_next_task_fair"
        }
    }
}

data_sources {
    config {
        name: "linux.process_stats"
        target_buffer: 0
    }
}